name: Build VOID
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip build-essential git python3-setuptools colorama libffi-dev setup-tools
          pip3 install --user --upgrade buildozer

      - name: Build APK with Buildozer
        run: |
          export PATH=$PATH:~/.local/bin
          buildozer android debug
        continue-on-error: true

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: VOID-Blackout-Package
          path: bin/*.apk
